naftiko: "1.0.0-alpha1"

info:
  label: "Sigstore Rekor"
  description: >-
    Rekor is Sigstore's cryptographically secure, immutable transparency log for
    signed software releases. The API provides endpoints for creating log entries,
    retrieving entries by UUID, searching the index, and verifying log proofs.
  tags:
    - Cryptography
    - Open Source
    - Security
    - Software Supply Chain
    - Transparency Log
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      REKOR_BASE_URL: REKOR_BASE_URL

capability:
  consumes:
    - type: http
      namespace: rekor
      baseUri: "{{env.REKOR_BASE_URL}}"
      description: "Rekor transparency log REST API"
      resources:
        - name: log-entries
          path: /api/v1/log/entries
          description: Transparency log entries
          operations:
            - name: create-log-entry
              method: POST
              description: Create a new entry in the transparency log
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  apiVersion: "{{tools.apiVersion}}"
                  kind: "{{tools.kind}}"
                  spec: "{{tools.spec}}"

            - name: get-log-entry
              method: GET
              description: Get a specific log entry by UUID
              inputParameters:
                - name: entryUUID
                  in: path
                  type: string
                  required: true
                  description: The UUID of the log entry
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: search-log-entries
              method: POST
              description: Search for log entries by entry UUID, hash, or public key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  entryUUIDs: "{{tools.entryUUIDs}}"
                  logIndexes: "{{tools.logIndexes}}"

        - name: log-index
          path: /api/v1/index/retrieve
          description: Search the log index
          operations:
            - name: search-index
              method: POST
              description: Search index by entry metadata (hash, email, public key)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  hash: "{{tools.hash}}"
                  email: "{{tools.email}}"
                  publicKey: "{{tools.publicKey}}"

        - name: log-info
          path: /api/v1/log
          description: Transparency log information
          operations:
            - name: get-log-info
              method: GET
              description: Get information about the transparency log including tree size
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: log-proof
          path: /api/v1/log/proof
          description: Log consistency proofs
          operations:
            - name: get-log-proof
              method: GET
              description: Get consistency proof for the log between two tree sizes
              inputParameters:
                - name: firstSize
                  in: query
                  type: integer
                  required: true
                  description: The first tree size
                - name: lastSize
                  in: query
                  type: integer
                  required: false
                  description: The last tree size
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: rekor-rest
      resources:
        - path: /v1/log-entries
          name: log-entries
          description: Transparency log entries
          operations:
            - method: POST
              name: create-log-entry
              description: Create a new log entry
              call: "rekor.create-log-entry"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: search-log-entries
              description: Search log entries
              call: "rekor.search-log-entries"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-entries/{entryUUID}
          name: log-entry
          description: Individual log entry
          operations:
            - method: GET
              name: get-log-entry
              description: Get log entry by UUID
              call: "rekor.get-log-entry"
              with:
                entryUUID: "rest.entryUUID"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/index
          name: log-index
          description: Log index search
          operations:
            - method: POST
              name: search-index
              description: Search log index by artifact hash or signer email
              call: "rekor.search-index"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log
          name: log-info
          description: Log information
          operations:
            - method: GET
              name: get-log-info
              description: Get transparency log tree information
              call: "rekor.get-log-info"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: rekor-mcp
      transport: http
      tools:
        - name: create-log-entry
          description: Add a new signed artifact entry to the Rekor transparency log
          hints:
            readOnly: false
            idempotent: false
          call: "rekor.create-log-entry"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-log-entry
          description: Retrieve a specific transparency log entry by UUID
          hints:
            readOnly: true
            idempotent: true
          call: "rekor.get-log-entry"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-index
          description: Search the Rekor index for log entries by artifact hash or signer email
          hints:
            readOnly: true
            idempotent: true
          call: "rekor.search-index"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-log-info
          description: Get current Rekor transparency log tree information including size
          hints:
            readOnly: true
            idempotent: true
          call: "rekor.get-log-info"
          outputParameters:
            - type: object
              mapping: "$."
