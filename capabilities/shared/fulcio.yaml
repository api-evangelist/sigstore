naftiko: "1.0.0-alpha1"

info:
  label: "Sigstore Fulcio"
  description: >-
    Fulcio is Sigstore's free Root Certificate Authority for code signing. It issues
    short-lived signing certificates to software producers based on OIDC identity
    tokens, eliminating the need to manage long-lived signing keys.
  tags:
    - Certificate Authority
    - Code Signing
    - Cryptography
    - OIDC
    - PKI
    - Security
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      FULCIO_BASE_URL: FULCIO_BASE_URL

capability:
  consumes:
    - type: http
      namespace: fulcio
      baseUri: "{{env.FULCIO_BASE_URL}}"
      description: "Fulcio certificate authority REST API"
      resources:
        - name: signing-cert
          path: /api/v2/signingCert
          description: Request short-lived signing certificates
          operations:
            - name: create-signing-cert
              method: POST
              description: Request a signing certificate using OIDC identity token and public key
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  credentials: "{{tools.credentials}}"
                  publicKeyRequest: "{{tools.publicKeyRequest}}"

        - name: trust-bundle
          path: /api/v2/trustBundle
          description: CA trust bundle
          operations:
            - name: get-trust-bundle
              method: GET
              description: Get the Fulcio CA trust bundle (root certificates)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: configuration
          path: /api/v2/configuration
          description: CA configuration including supported OIDC issuers
          operations:
            - name: get-configuration
              method: GET
              description: Get the Fulcio CA configuration including supported OIDC issuers
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: fulcio-rest
      resources:
        - path: /v1/signing-cert
          name: signing-cert
          description: Signing certificate issuance
          operations:
            - method: POST
              name: create-signing-cert
              description: Request a short-lived signing certificate
              call: "fulcio.create-signing-cert"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/trust-bundle
          name: trust-bundle
          description: CA trust bundle
          operations:
            - method: GET
              name: get-trust-bundle
              description: Get CA root certificates
              call: "fulcio.get-trust-bundle"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/configuration
          name: configuration
          description: CA configuration
          operations:
            - method: GET
              name: get-configuration
              description: Get supported OIDC issuers and CA configuration
              call: "fulcio.get-configuration"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: fulcio-mcp
      transport: http
      tools:
        - name: create-signing-cert
          description: Request a short-lived X.509 signing certificate from Fulcio using OIDC identity
          hints:
            readOnly: false
            idempotent: false
          call: "fulcio.create-signing-cert"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-trust-bundle
          description: Retrieve the Fulcio CA trust bundle (root and intermediate certificates)
          hints:
            readOnly: true
            idempotent: true
          call: "fulcio.get-trust-bundle"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-ca-configuration
          description: Get Fulcio CA configuration including supported OIDC identity providers
          hints:
            readOnly: true
            idempotent: true
          call: "fulcio.get-configuration"
          outputParameters:
            - type: object
              mapping: "$."
